<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ojek Online Mandiri</title>
    <style>
        /* CSS: Tampilan Bersih ala Maxim */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #f2f2f2; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
        }
        .app-container { 
            background-color: #ffffff; 
            width: 100%; 
            max-width: 450px; 
            min-height: 100vh; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
        }
        .header { 
            background-color: #ffcc00; 
            padding: 25px 20px; 
            text-align: center; 
            font-weight: 900; 
            font-size: 24px; 
            letter-spacing: 1px;
            color: #111;
        }
        .form-section { padding: 25px; flex-grow: 1; }
        .input-group { margin-bottom: 20px; }
        .input-group label { 
            font-size: 14px; 
            font-weight: bold; 
            color: #444; 
            display: block; 
            margin-bottom: 8px; 
        }
        .input-group input { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            font-size: 16px; 
            box-sizing: border-box; 
            outline: none;
            background-color: #f9f9f9;
        }
        .input-group input:focus { border-color: #ffcc00; background-color: #fff; }
        
        #status { 
            font-size: 13px; 
            color: #888; 
            text-align: center; 
            margin-bottom: 15px; 
            min-height: 20px;
        }

        .btn-hitung { 
            background-color: #111; 
            color: #ffcc00; 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .btn-hitung:active { transform: scale(0.98); }

        /* Area Hasil Harga */
        .price-container { 
            background-color: #fafafa; 
            padding: 30px 20px; 
            text-align: center; 
            border-top: 1px solid #eee; 
        }
        .price-label { font-size: 14px; color: #888; margin: 0; }
        .price-value { font-size: 36px; font-weight: 900; color: #111; margin: 5px 0 20px 0; }
        .km-label { font-size: 16px; color: #444; font-weight: bold; margin-bottom: 15px; }

        .btn-wa { 
            background-color: #25D366; 
            color: white; 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            display: none; /* Muncul hanya setelah hitung */
            text-decoration: none;
            display: none; 
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">OJEK MANDIRI</div>
        
        <div class="form-section">
            <div class="input-group">
                <label>📍 Titik Jemput</label>
                <input type="text" id="start" placeholder="Cth: Homestay Dieng / Terminal">
            </div>
            
            <div class="input-group">
                <label>🏁 Titik Tujuan</label>
                <input type="text" id="end" placeholder="Cth: Kawah Sikidang / Candi Arjuna">
            </div>

            <div id="status"></div>

            <button class="btn-hitung" onclick="hitungOtomatis()">CEK HARGA SEKARANG</button>
        </div>

        <div class="price-container">
            <div id="displayJarak" class="km-label">Jarak: 0 km</div>
            <p class="price-label">Estimasi Biaya</p>
            <div class="price-value" id="displayHarga">Rp 0</div>
            
            <button id="btnWa" class="btn-wa" onclick="kirimWhatsApp()">PESAN VIA WHATSAPP</button>
        </div>
    </div>

    <script>
        // --- KONFIGURASI ---
        const TARIF_DASAR = 5000;    // Biaya awal
        const TARIF_PER_KM = 3000;   // Biaya per km
        const NOMOR_WA = "6281234567890"; // GANTI DENGAN NOMOR ANDA (Awali 62)

        let globalJarak = 0;
        let globalHarga = 0;

        // Mencari koordinat lokasi
        async function getCoords(query) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const data = await res.json();
                return data.length > 0 ? { lat: data[0].lat, lon: data[0].lon } : null;
            } catch (err) {
                return null;
            }
        }

        // Hitung Jarak & Harga Otomatis
        async function hitungOtomatis() {
            const startText = document.getElementById('start').value;
            const endText = document.getElementById('end').value;
            const status = document.getElementById('status');
            const btnWa = document.getElementById('btnWa');

            if (!startText || !endText) {
                alert("Harap isi lokasi jemput dan tujuan!");
                return;
            }

            status.innerText = "⏳ Sedang mencari rute terbaik...";
            btnWa.style.display = "none";

            const startCoord = await getCoords(startText);
            const endCoord = await getCoords(endText);

            if (startCoord && endCoord) {
                // Ambil rute jalan raya via OSRM
                try {
                    const routeRes = await fetch(`https://router.project-osrm.org/route/v1/driving/${startCoord.lon},${startCoord.lat};${endCoord.lon},${endCoord.lat}?overview=false`);
                    const routeData = await routeRes.json();
                    
                    if (routeData.routes && routeData.routes.length > 0) {
                        globalJarak = (routeData.routes[0].distance / 1000).toFixed(1);
                        
                        // Rumus Harga
                        globalHarga = TARIF_DASAR + (globalJarak * TARIF_PER_KM);
                        // Pembulatan ke atas ke ratusan terdekat
                        globalHarga = Math.ceil(globalHarga / 100) * 100;

                        // Tampilkan Hasil
                        document.getElementById('displayJarak').innerText = "Jarak: " + globalJarak + " km";
                        document.getElementById('displayHarga').innerText = "Rp " + globalHarga.toLocaleString('id-ID');
                        
                        btnWa.style.display = "flex";
                        status.innerText = "✅ Rute ditemukan!";
                    } else {
                        status.innerText = "❌ Rute jalan tidak ditemukan.";
                    }
                } catch (e) {
                    status.innerText = "❌ Error menghubungi server rute.";
                }
            } else {
                status.innerText = "❌ Lokasi tidak dikenali. Coba ketik lebih spesifik.";
            }
        }

        function kirimWhatsApp() {
            const jemput = document.getElementById('start').value;
            const tujuan = document.getElementById('end').value;
            
            const pesan = `Halo, saya ingin pesan ojek.%0A%0A📍 *Jemput:* ${jemput}%0A🏁 *Tujuan:* ${tujuan}%0A🛣️ *Jarak:* ${globalJarak} km%0A💰 *Total Harga:* Rp ${globalHarga.toLocaleString('id-ID')}%0A%0AApakah tersedia?`;
            
            window.open(`https://wa.me/${NOMOR_WA}?text=${pesan}`, "_blank");
        }
    </script>
</body>
</html>
